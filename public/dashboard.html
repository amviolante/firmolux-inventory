<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Firmolux — Inventory Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #F5F0E8;
      --parchment: #EDE5D4;
      --stone: #C8B99A;
      --clay: #8B6F5E;
      --terracotta: #A0522D;
      --dark: #1A1410;
      --low: #8B3A3A;
      --low-bg: #FDF0EE;
      --ok: #3A6B4A;
      --ok-bg: #F0F7F2;
      --border: rgba(200,185,154,0.35);
    }

    body {
      min-height: 100vh;
      background: var(--cream);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      color: var(--dark);
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 50% 40% at 0% 100%, rgba(139,111,94,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 40% 50% at 100% 0%, rgba(200,185,154,0.1) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Header ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(245,240,232,0.9);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      padding: 0 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
    }

    .wordmark {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .last-updated {
      font-size: 11px;
      color: var(--stone);
      letter-spacing: 0.05em;
    }

    .btn-logout {
      font-family: 'Jost', sans-serif;
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--clay);
      background: none;
      border: 1px solid var(--stone);
      padding: 6px 16px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-logout:hover { background: var(--clay); color: var(--cream); border-color: var(--clay); }

    /* ── Layout ── */
    main {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 40px 80px;
    }

    .page-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--clay);
      margin-bottom: 32px;
    }

    /* ── Summary Strip ── */
    .summary-strip {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      margin-bottom: 40px;
    }

    .summary-card {
      background: var(--cream);
      padding: 24px 28px;
      text-align: center;
    }

    .summary-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 42px;
      font-weight: 300;
      line-height: 1;
      margin-bottom: 6px;
    }

    .summary-num.alert { color: var(--low); }

    .summary-label {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--clay);
    }

    /* ── Product Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 2px;
      background: var(--border);
      border: 1px solid var(--border);
    }

    .product-card {
      background: var(--cream);
      padding: 28px 32px;
      transition: background 0.15s;
      position: relative;
    }

    .product-card.low { background: #FDF8F6; }
    .product-card:hover { background: #FAF6F0; }

    .product-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .product-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-weight: 400;
      letter-spacing: 0.02em;
      line-height: 1.2;
    }

    .product-code {
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--stone);
      text-transform: uppercase;
      margin-top: 2px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--ok);
      flex-shrink: 0;
      margin-top: 6px;
    }
    .status-dot.low { background: var(--low); animation: pulse 1.5s ease-in-out infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.85); }
    }

    /* ── Gauge ── */
    .gauge-wrap {
      margin-bottom: 20px;
    }

    .gauge-bar {
      height: 3px;
      background: rgba(200,185,154,0.3);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .gauge-fill {
      height: 100%;
      border-radius: 2px;
      background: var(--clay);
      transition: width 0.4s ease;
    }
    .gauge-fill.low { background: var(--low); }

    .gauge-labels {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .big-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 32px;
      font-weight: 300;
      line-height: 1;
    }

    .big-num.low { color: var(--low); }

    .big-unit {
      font-size: 12px;
      color: var(--stone);
      margin-left: 4px;
    }

    .bucket-count {
      font-size: 12px;
      color: var(--stone);
      text-align: right;
    }

    .bucket-count span { color: var(--dark); font-weight: 400; }

    /* ── Controls ── */
    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .control-group label {
      display: block;
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--stone);
      margin-bottom: 5px;
    }

    .input-row {
      display: flex;
      gap: 4px;
    }

    .input-row input {
      flex: 1;
      min-width: 0;
      padding: 7px 10px;
      background: var(--parchment);
      border: 1px solid transparent;
      font-family: 'Jost', sans-serif;
      font-size: 14px;
      font-weight: 300;
      color: var(--dark);
      outline: none;
      transition: border-color 0.2s;
    }
    .input-row input:focus { border-color: var(--stone); }

    .input-row button {
      padding: 7px 12px;
      background: var(--dark);
      color: var(--cream);
      border: none;
      font-family: 'Jost', sans-serif;
      font-size: 11px;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .input-row button:hover { background: var(--clay); }

    .saved-flash {
      position: absolute;
      bottom: 10px;
      right: 16px;
      font-size: 10px;
      color: var(--ok);
      letter-spacing: 0.1em;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .saved-flash.show { opacity: 1; }

    /* ── Alert banner ── */
    .low-banner {
      display: none;
      background: #FDF0EE;
      border: 1px solid rgba(139,58,58,0.2);
      padding: 10px 16px;
      margin-bottom: 2px;
      font-size: 11px;
      color: var(--low);
      letter-spacing: 0.05em;
      grid-column: 1 / -1;
    }

    /* ── Log ── */
    .section-title {
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--clay);
      margin: 48px 0 16px;
    }

    .log-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    .log-table th {
      text-align: left;
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--stone);
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
    }

    .log-table td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      color: var(--dark);
    }

    .log-table tr:hover td { background: rgba(200,185,154,0.08); }

    .loading {
      font-size: 13px;
      color: var(--stone);
      letter-spacing: 0.05em;
      padding: 40px;
      text-align: center;
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      header { padding: 0 20px; }
      main { padding: 24px 20px 60px; }
      .summary-strip { grid-template-columns: 1fr; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="wordmark">Firmolux</div>
  <div class="header-right">
    <span class="last-updated" id="lastUpdated">—</span>
    <form method="POST" action="/logout" style="display:inline">
      <button class="btn-logout" type="submit">Sign Out</button>
    </form>
  </div>
</header>

<main>
  <div class="page-title">Inventory Dashboard</div>

  <div class="summary-strip">
    <div class="summary-card">
      <div class="summary-num" id="sumTotal">—</div>
      <div class="summary-label">Total Products</div>
    </div>
    <div class="summary-card">
      <div class="summary-num alert" id="sumLow">—</div>
      <div class="summary-label">Below Reorder Threshold</div>
    </div>
    <div class="summary-card">
      <div class="summary-num" id="sumOk">—</div>
      <div class="summary-label">Healthy Stock</div>
    </div>
  </div>

  <div class="grid" id="productGrid">
    <div class="loading">Loading inventory…</div>
  </div>

  <div class="section-title">Recent Shipment Log</div>
  <table class="log-table">
    <thead>
      <tr>
        <th>Time</th>
        <th>Order ID</th>
        <th>Deductions</th>
      </tr>
    </thead>
    <tbody id="logBody">
      <tr><td colspan="3" style="color:#C8B99A;padding:16px 12px">Loading…</td></tr>
    </tbody>
  </table>
</main>

<script>
  let products = [];

  async function loadProducts() {
    const res = await fetch('/api/products');
    products = await res.json();
    renderGrid(products);
    document.getElementById('lastUpdated').textContent = 'Updated ' + new Date().toLocaleTimeString();
    const low = products.filter(p => p.is_low).length;
    document.getElementById('sumTotal').textContent = products.length;
    document.getElementById('sumLow').textContent = low;
    document.getElementById('sumOk').textContent = products.length - low;
  }

  function renderGrid(products) {
    const grid = document.getElementById('productGrid');
    if (!products.length) { grid.innerHTML = '<div class="loading">No products found</div>'; return; }

    grid.innerHTML = products.map(p => {
      const isLow = p.is_low;
      const maxBuckets = Math.max(p.reorder_buckets * 3, p.buckets_remaining, 1);
      const fillPct = Math.min(100, (p.buckets_remaining / maxBuckets) * 100);
      const qty = parseFloat(p.current_qty).toFixed(1);
      const buckets = parseFloat(p.buckets_remaining).toFixed(1);

      return `
        <div class="product-card ${isLow ? 'low' : ''}" data-code="${p.code}">
          <div class="product-header">
            <div>
              <div class="product-name">${p.name}</div>
              <div class="product-code">${p.code} · ${p.bucket_size}${p.unit} / bucket</div>
            </div>
            <div class="status-dot ${isLow ? 'low' : ''}"></div>
          </div>

          <div class="gauge-wrap">
            <div class="gauge-bar">
              <div class="gauge-fill ${isLow ? 'low' : ''}" style="width:${fillPct}%"></div>
            </div>
            <div class="gauge-labels">
              <div>
                <span class="big-num ${isLow ? 'low' : ''}">${qty}</span>
                <span class="big-unit">${p.unit}</span>
              </div>
              <div class="bucket-count">
                <span>${buckets}</span> buckets remaining
              </div>
            </div>
          </div>

          <div class="controls">
            <div class="control-group">
              <label>Set Inventory (buckets)</label>
              <div class="input-row">
                <input type="number" min="0" step="0.5" placeholder="${buckets}" id="inv-${p.code}">
                <button onclick="setInventory('${p.code}')">Set</button>
              </div>
            </div>
            <div class="control-group">
              <label>Reorder Alert (buckets)</label>
              <div class="input-row">
                <input type="number" min="0" step="1" value="${p.reorder_buckets}" id="thr-${p.code}">
                <button onclick="setThreshold('${p.code}')">Save</button>
              </div>
            </div>
          </div>

          <span class="saved-flash" id="flash-${p.code}">Saved ✓</span>
        </div>
      `;
    }).join('');
  }

  async function setInventory(code) {
    const val = document.getElementById(`inv-${code}`).value;
    if (!val) return;
    await fetch(`/api/products/${code}/set-inventory`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ buckets: parseFloat(val) })
    });
    flash(code);
    loadProducts();
  }

  async function setThreshold(code) {
    const val = document.getElementById(`thr-${code}`).value;
    if (!val) return;
    await fetch(`/api/products/${code}/set-threshold`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ reorder_buckets: parseFloat(val) })
    });
    flash(code);
    loadProducts();
  }

  function flash(code) {
    const el = document.getElementById(`flash-${code}`);
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2000);
  }

  async function loadLog() {
    const res = await fetch('/api/log');
    const rows = await res.json();
    const tbody = document.getElementById('logBody');
    if (!rows.length) {
      tbody.innerHTML = '<tr><td colspan="3" style="color:#C8B99A;padding:16px 12px">No shipments processed yet</td></tr>';
      return;
    }
    tbody.innerHTML = rows.map(r => {
      const deductions = Array.isArray(r.deductions)
        ? r.deductions.map(d => `${d.product} −${d.qty}`).join(', ')
        : JSON.stringify(r.deductions);
      const time = new Date(r.processed_at).toLocaleString();
      return `<tr>
        <td>${time}</td>
        <td style="color:var(--stone);font-size:11px">${r.shipstation_order_id || '—'}</td>
        <td>${deductions}</td>
      </tr>`;
    }).join('');
  }

  // Initial load
  loadProducts();
  loadLog();

  // Auto-refresh every 60 seconds
  setInterval(() => { loadProducts(); loadLog(); }, 60000);
</script>
</body>
</html>
